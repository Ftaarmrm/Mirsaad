name: 🐳 Docker Build & Test

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: mirsad:test

      - name: 💾 Export Docker image (for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          tags: mirsad:test

      - name: 🧪 Test Docker container
        run: |
          docker load --input /tmp/image.tar
          docker run -d --name mirsad-test-container \
            -e DATABASE_URL="file:/tmp/test.db" \
            -p 3000:3000 \
            mirsad:test

          # Stream container logs live so we can see startup output in CI
          docker logs -f mirsad-test-container &

          # Retry curl up to 12 times (total 60 seconds)
          success=false
          for i in $(seq 1 12); do
            echo "--- Health check attempt $i/12 ---"
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Container responded on HTTP!"
              success=true
              break
            fi
            sleep 5
          done

          # Always dump final logs for context
          echo "=== CONTAINER LOGS ==="
          docker logs mirsad-test-container

          if [ "$success" = false ]; then
            echo "❌ Container failed to respond within 60 seconds"
            docker rm -f mirsad-test-container
            exit 1
          fi

          docker rm -f mirsad-test-container

      - name: 📊 Docker image info
        run: |
          docker load --input /tmp/image.tar
          docker images | grep mirsad
          docker inspect mirsad:test | jq '.[] | {Size, Architecture, Created}'
