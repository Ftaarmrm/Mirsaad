name: 🐳 Docker Build & Test

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: mirsad:test

      - name: 💾 Export Docker image (for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          tags: mirsad:test

      - name: 🧪 Test Docker container
        run: |
          docker load --input /tmp/image.tar
          docker run -d --rm -e DATABASE_URL="file:/tmp/test.db" -p 3000:3000 mirsad:test &
          sleep 5
          if curl -s http://localhost:3000 > /dev/null; then
            echo "✅ Container responded on HTTP"
          else
            echo "❌ Container did not respond on HTTP"
            exit 1
          fi

      - name: 📊 Docker image info
        run: |
          docker load --input /tmp/image.tar
          docker images | grep mirsad
          docker inspect mirsad:test | jq '.[] | {Size, Architecture, Created}'
