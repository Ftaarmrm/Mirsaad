# ============================================================
#  Mirsad — Docker Compose
#  للتجربة المحلية واستخدامه كمرجع لإعداد Coolify
# ============================================================
#
#  التشغيل السريع:
#    cp .env.example .env   # وعدّل القيم
#    docker compose up -d
#    docker compose logs -f
#
#  Coolify:
#    - رفع المشروع كـ "Docker Compose" أو "Dockerfile"
#    - أضف env vars من هذا الملف في لوحة Coolify
#    - أنشئ Persistent Storage لـ /data/db
# ============================================================

services:
  mirsad:
    build:
      context: .
      dockerfile: Dockerfile
      # تجاهل cache إذا أردت build نظيف:
      # no_cache: true
    image: mirsad:latest
    container_name: mirsad
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      # ── Database ──────────────────────────────────────────
      DATABASE_URL: "file:/data/db/mirsad.db"

      # ── App ───────────────────────────────────────────────
      NODE_ENV: "production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_BRAND_VARIANT: "default"       # default | economy | tech | energy

      # ── Admin (غيّر هذه القيم!) ───────────────────────────
      ADMIN_PASSWORD: "change-me-now-please"
      ADMIN_SECRET: "change-to-random-32-char-string"  # openssl rand -hex 32

      # ── AI (اختياري) ─────────────────────────────────────
      Z_AI_API_KEY: ""

      # ── AdSense (اختياري) ────────────────────────────────
      NEXT_PUBLIC_ADSENSE_CLIENT_ID: ""

      # ── Security (اختياري) ───────────────────────────────
      FETCH_NEWS_API_KEY: ""
      ALLOWED_ORIGINS: "http://localhost:3000"

      # ── Logging ───────────────────────────────────────────
      LOG_LEVEL: "info"

    volumes:
      # قاعدة البيانات — بيانات دائمة
      - mirsad_db:/data/db

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mirsad_db:
    driver: local
    # في Coolify يتم تعريف هذا الـ volume من لوحة التحكم
    # (Persistent Storage → /data/db)
